<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Tableau de bord</title>
</head>

<body>
<div layout:fragment="content">

    <!-- Page header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1">
                <i class="bi bi-speedometer2 text-primary me-2"></i>Tableau de bord
            </h1>
            <p class="text-muted mb-0">Vue d'ensemble de la bibliothèque</p>
        </div>
        <div class="text-muted small">
            <i class="bi bi-calendar3 me-1"></i>
            <span th:text="${#temporals.format(#temporals.createNow(), 'EEEE dd MMMM yyyy', #locale)}">Date</span>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="row g-4 mb-5">

        <!-- Livres -->
        <div class="col-12 col-sm-6 col-xl-3">
            <a th:href="@{/livres}" class="text-decoration-none">
                <div class="card kpi-card kpi-blue h-100 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="kpi-icon bg-primary-subtle rounded-3">
                            <i class="bi bi-journals text-primary fs-2"></i>
                        </div>
                        <div>
                            <div class="kpi-value" th:text="${nbLivres}">0</div>
                            <div class="kpi-label">Livres au catalogue</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Membres -->
        <div class="col-12 col-sm-6 col-xl-3">
            <a th:href="@{/membres}" class="text-decoration-none">
                <div class="card kpi-card kpi-green h-100 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="kpi-icon bg-success-subtle rounded-3">
                            <i class="bi bi-people text-success fs-2"></i>
                        </div>
                        <div>
                            <div class="kpi-value" th:text="${nbMembres}">0</div>
                            <div class="kpi-label">Membres inscrits</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Emprunts en cours -->
        <div class="col-12 col-sm-6 col-xl-3">
            <a th:href="@{/emprunts(statut='EN_COURS')}" class="text-decoration-none">
                <div class="card kpi-card kpi-orange h-100 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="kpi-icon bg-warning-subtle rounded-3">
                            <i class="bi bi-arrow-left-right text-warning fs-2"></i>
                        </div>
                        <div>
                            <div class="kpi-value" th:text="${nbEnCours}">0</div>
                            <div class="kpi-label">Emprunts en cours</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- En retard -->
        <div class="col-12 col-sm-6 col-xl-3">
            <a th:href="@{/emprunts(statut='EN_RETARD')}" class="text-decoration-none">
                <div class="card kpi-card kpi-red h-100 shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="kpi-icon bg-danger-subtle rounded-3">
                            <i class="bi bi-clock-history text-danger fs-2"></i>
                        </div>
                        <div>
                            <div class="kpi-value" th:text="${nbEnRetard}">0</div>
                            <div class="kpi-label">Emprunts en retard</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Quick actions -->
    <div class="row g-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-lightning-fill text-warning me-2"></i>Actions rapides</h5>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-3">
                        <a th:href="@{/livres/nouveau}" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-2"></i>Ajouter un livre
                        </a>
                        <a th:href="@{/membres/nouveau}" class="btn btn-success">
                            <i class="bi bi-person-plus me-2"></i>Inscrire un membre
                        </a>
                        <a th:href="@{/emprunts/nouveau}" class="btn btn-warning">
                            <i class="bi bi-arrow-bar-right me-2"></i>Nouvel emprunt
                        </a>
                        <a th:href="@{/emprunts/export/csv}" class="btn btn-outline-secondary">
                            <i class="bi bi-download me-2"></i>Exporter CSV
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
