<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion – Bibliothèque FST</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
          rel="stylesheet"/>
    <style>
        :root { --brand: #4f46e5; --brand-dark: #3730a3; }
        * { font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e3a5f 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            width: 100%; max-width: 420px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 1.25rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            padding: 2.5rem;
        }
        .brand-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            border-radius: 1rem;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 24px rgba(79,70,229,0.5);
        }
        .login-title { color: #fff; font-weight: 700; font-size: 1.6rem; text-align: center; }
        .login-subtitle { color: rgba(255,255,255,0.55); font-size: .875rem; text-align: center; }
        .form-label { color: rgba(255,255,255,0.8); font-size: .875rem; font-weight: 500; }
        .form-control {
            background: rgba(255,255,255,0.08) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            color: #fff !important;
            border-radius: .625rem;
            padding: .65rem 1rem;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus {
            border-color: var(--brand) !important;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.35) !important;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.3) !important; }
        .input-group-text {
            background: rgba(255,255,255,0.08) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-right: none !important;
            color: rgba(255,255,255,0.6) !important;
        }
        .btn-login {
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            border: none; color: #fff; font-weight: 600;
            padding: .75rem; border-radius: .625rem;
            width: 100%; font-size: 1rem;
            transition: opacity .2s, transform .1s;
            box-shadow: 0 4px 15px rgba(79,70,229,0.4);
        }
        .btn-login:hover { opacity: .9; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .creds-box {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: .75rem;
            padding: 1rem;
            margin-top: 1.5rem;
        }
        .creds-title { color: rgba(255,255,255,0.5); font-size:.75rem; font-weight:600;
                       text-transform:uppercase; letter-spacing:.05em; margin-bottom:.5rem; }
        .cred-item { display:flex; justify-content:space-between; align-items:center;
                     color: rgba(255,255,255,0.7); font-size:.8rem; padding:.25rem 0; }
        .badge-role { font-size:.65rem; padding:.25em .5em; }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Brand -->
    <div class="brand-icon">
        <i class="bi bi-book-half text-white fs-2"></i>
    </div>
    <h1 class="login-title">BiblioFST</h1>
    <p class="login-subtitle mb-4">Gestion de la Bibliothèque – Master STR</p>

    <!-- Alerts -->
    <div th:if="${param.error}" class="alert alert-danger py-2 mb-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        Identifiants incorrects. Réessayez.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2 mb-3" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        Vous avez été déconnecté avec succès.
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Nom d'utilisateur</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" id="username" name="username"
                       class="form-control" placeholder="admin ou user"
                       autocomplete="username" required autofocus/>
            </div>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Mot de passe</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="••••••••"
                       autocomplete="current-password" required/>
            </div>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </button>
    </form>

    <!-- Comptes de test -->
    <div class="creds-box">
        <div class="creds-title"><i class="bi bi-info-circle me-1"></i>Comptes de test</div>
        <div class="cred-item">
            <span><i class="bi bi-person-fill-gear me-1"></i> admin / admin123</span>
            <span class="badge bg-warning text-dark badge-role">ADMIN</span>
        </div>
        <div class="cred-item">
            <span><i class="bi bi-person-fill me-1"></i> user / user123</span>
            <span class="badge bg-info text-dark badge-role">USER</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
