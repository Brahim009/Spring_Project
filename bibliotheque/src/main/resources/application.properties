# ==============================
# Application
# ==============================
spring.application.name=bibliotheque
server.port=8080

# ==============================
# DataSource MySQL
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotheque_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Tunis&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# Initialization (Execute data.sql)
# ==============================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==============================
# Thymeleaf
# ==============================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ==============================
# Logging
# ==============================
logging.level.com.fst.bibliotheque=DEBUG
logging.level.org.springframework.security=INFO
