<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head><title th:text="${pageTitle}">Formulaire Membre</title></head>

<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-6">

            <div class="d-flex align-items-center mb-4 gap-3">
                <a th:href="@{/membres}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Retour
                </a>
                <h1 class="h4 fw-bold mb-0" th:text="${pageTitle}"></h1>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form th:action="${membre.id != null ? '/membres/edit/' + membre.id : '/membres/nouveau'}"
                          th:object="${membre}" method="post" novalidate>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label for="nom" class="form-label fw-semibold">
                                    Nom <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="nom" th:field="*{nom}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'"
                                       placeholder="Nom de famille"/>
                                <div class="invalid-feedback" th:errors="*{nom}"></div>
                            </div>
                            <div class="col-6">
                                <label for="prenom" class="form-label fw-semibold">
                                    Prénom <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="prenom" th:field="*{prenom}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid'"
                                       placeholder="Prénom"/>
                                <div class="invalid-feedback" th:errors="*{prenom}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">
                                Email <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" th:field="*{email}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="prenom.nom@fst.utm.tn"/>
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="dateInscription" class="form-label fw-semibold">
                                Date d'inscription <span class="text-danger">*</span>
                            </label>
                            <input type="date" id="dateInscription" th:field="*{dateInscription}"
                                   class="form-control"/>
                        </div>

                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch"
                                       id="actif" th:field="*{actif}"/>
                                <label class="form-check-label fw-semibold" for="actif">
                                    Membre actif
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg me-1"></i>Enregistrer
                            </button>
                            <a th:href="@{/membres}" class="btn btn-outline-secondary">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
