<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">

<head><title>Membres</title></head>

<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1"><i class="bi bi-people text-success me-2"></i>Gestion des Membres</h1>
            <p class="text-muted mb-0" th:text="'Total : ' + ${membresPage.totalElements} + ' membre(s)'"></p>
        </div>
        <a th:href="@{/membres/nouveau}" sec:authorize="hasRole('ADMIN')" class="btn btn-success">
            <i class="bi bi-person-plus me-1"></i>Inscrire un membre
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Nom complet</th>
                        <th>Email</th>
                        <th>Date d'inscription</th>
                        <th class="text-center">Statut</th>
                        <th class="text-center" sec:authorize="hasRole('ADMIN')">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${membresPage.empty}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-person-x fs-1 d-block mb-2"></i>Aucun membre trouvé.
                        </td>
                    </tr>
                    <tr th:each="membre : ${membresPage.content}">
                        <td class="text-muted small" th:text="${membre.id}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="avatar-sm bg-success-subtle rounded-circle d-flex align-items-center
                                            justify-content-center text-success fw-bold"
                                     style="width:36px;height:36px;font-size:.8rem;"
                                     th:text="${#strings.substring(membre.prenom,0,1) + #strings.substring(membre.nom,0,1)}">
                                </div>
                                <span class="fw-semibold" th:text="${membre.prenom + ' ' + membre.nom}"></span>
                            </div>
                        </td>
                        <td>
                            <a th:href="'mailto:' + ${membre.email}" class="text-decoration-none"
                               th:text="${membre.email}"></a>
                        </td>
                        <td th:text="${#temporals.format(membre.dateInscription, 'dd/MM/yyyy')}"></td>
                        <td class="text-center">
                            <span class="badge rounded-pill"
                                  th:classappend="${membre.actif} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${membre.actif} ? 'Actif' : 'Inactif'"></span>
                        </td>
                        <td class="text-center" sec:authorize="hasRole('ADMIN')">
                            <div class="d-flex gap-1 justify-content-center">
                                <a th:href="@{/membres/edit/{id}(id=${membre.id})}"
                                   class="btn btn-sm btn-outline-primary" title="Modifier">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <a th:href="@{/membres/delete/{id}(id=${membre.id})}"
                                   class="btn btn-sm btn-outline-danger" title="Supprimer"
                                   onclick="return confirm('Supprimer ce membre ?')">
                                    <i class="bi bi-trash3"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer d-flex justify-content-between align-items-center"
             th:if="${membresPage.totalPages > 1}">
            <small class="text-muted">
                Page <span th:text="${membresPage.number + 1}"></span>
                sur <span th:text="${membresPage.totalPages}"></span>
            </small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${membresPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/membres(page=${membresPage.number - 1})}">
                            <i class="bi bi-chevron-left"></i></a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, membresPage.totalPages - 1)}"
                        th:classappend="${i == membresPage.number} ? 'active'">
                        <a class="page-link" th:href="@{/membres(page=${i})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${membresPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/membres(page=${membresPage.number + 1})}">
                            <i class="bi bi-chevron-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
