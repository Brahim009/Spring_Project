<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>404 – Page introuvable</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f8f9fa; display: flex; align-items: center;
               justify-content: center; min-height: 100vh; }
        .error-code { font-size: 8rem; font-weight: 800; line-height: 1;
                      background: linear-gradient(135deg, #6366f1, #8b5cf6);
                      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
<div class="text-center px-4">
    <div class="error-code">404</div>
    <h1 class="h3 fw-bold mt-2 mb-1">Page introuvable</h1>
    <p class="text-muted mb-4">La page que vous cherchez n'existe pas ou a été déplacée.</p>
    <a href="/" class="btn btn-primary">
        <i class="bi bi-house-fill me-2"></i>Retour à l'accueil
    </a>
</div>
</body>
</html>
