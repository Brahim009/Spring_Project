<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE | Bibliothèque FST">Bibliothèque FST</title>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet"/>
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- ========== NAVBAR ========== -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNavbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-book-half me-2"></i>Bibliothèque<span class="text-warning">FST</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:classappend="${currentUri == '/'} ? 'active'">
                        <i class="bi bi-speedometer2 me-1"></i>Tableau de bord
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/livres}"
                       th:classappend="${#strings.startsWith(currentUri, '/livres')} ? 'active'">
                        <i class="bi bi-journals me-1"></i>Livres
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/membres}"
                       th:classappend="${#strings.startsWith(currentUri, '/membres')} ? 'active'">
                        <i class="bi bi-people me-1"></i>Membres
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/emprunts}"
                       th:classappend="${#strings.startsWith(currentUri, '/emprunts')} ? 'active'">
                        <i class="bi bi-arrow-left-right me-1"></i>Emprunts
                    </a>
                </li>
            </ul>

            <!-- User info + logout -->
            <div class="d-flex align-items-center gap-3">
                <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
                    <div class="avatar-circle">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <div class="text-white">
                        <small class="d-block lh-1 opacity-75">Connecté en tant que</small>
                        <strong sec:authentication="name" class="small"></strong>
                        <span sec:authorize="hasRole('ADMIN')"
                              class="badge bg-warning text-dark ms-1 small">ADMIN</span>
                        <span sec:authorize="hasRole('USER') and !hasRole('ADMIN')"
                              class="badge bg-info text-dark ms-1 small">USER</span>
                    </div>
                </div>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- ========== MAIN CONTENT ========== -->
<main class="container-fluid px-4 py-4">

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Page content injected here -->
    <div layout:fragment="content"></div>
</main>

<!-- ========== FOOTER ========== -->
<footer class="footer mt-auto py-3">
    <div class="container-fluid px-4 text-center">
        <small class="text-muted">
            &copy; 2024 Bibliothèque FST Tunis &mdash; Master STR &mdash;
            Développé avec <i class="bi bi-heart-fill text-danger"></i> Spring Boot 3
        </small>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Auto-dismiss alerts after 4s -->
<script>
    setTimeout(() => {
        document.querySelectorAll('.alert').forEach(a => {
            const bsAlert = bootstrap.Alert.getOrCreateInstance(a);
            if (bsAlert) bsAlert.close();
        });
    }, 4000);
</script>
</body>
</html>
